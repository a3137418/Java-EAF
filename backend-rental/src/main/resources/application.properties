spring.application.name=backend-rental
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/rental_db?useSSL=false&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&characterEncoding=utf8
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT: 長度至少 32 bytes，正式環境請改成環境變數
app.jwt.secret=ThisIsADevelopmentSecretKeyForRentalSystem1234567890
app.jwt.expiration-minutes=1440

# CORS
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# Log
logging.level.root=INFO
logging.level.com.example.rental=DEBUG
logging.file.name=logs/rental-backend.log