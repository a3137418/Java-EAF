<!DOCTYPE html>
<html>
	<head>
		<meta charset="UTF-8">
		<title>YouBike SPA</title>
		<link rel="stylesheet" href="/css/bike.css">
	</head>
	<body>
		<div class="container">
			<h1>YouBike 管理系統 SPA(Single Page Application)</h1>
			<p class="subtitle"></p>
			
			<!-- 顯示訊息的空間 -->
			<div id="messageBox" class="message-box info">顯示訊息...</div>
			
		
			<!--  資料表單  -->
			<section class="card">
				<h2>資料表單</h2>
				<form id="bikeForm">
					<!--修改時才會使用的ID欄位-->
					<div class="form-row">
						<label for="bikeId">ID</label>
						<input type="number" id="bikeId" placeholder="修改時回自動帶入" readonly/>
					</div>
					
					<div class="form-row">
						<label for="bikeName">站名</label>
						<input type="text" id="bikeName" placeholder="例如:桃園站"/>
					</div>
					
					<div class="form-row">
						<label for="bikePrice">租車價格</label>
						<input type="number" step="0.5" id="bikePrice" placeholder="例如:30"/>
					</div>
					
					<div class="form-row">
						<label for="bikeType">車型</label>
						<input type="text" id="bikeType" placeholder="例如:一般車"/>
					</div>
					
					<div class="form-row checkbox-row">
						<label for="bikeIsAvailable">是否出租</label>
						<input type="checkbox" id="bikeIsAvailable">
					</div>
					
					<div class="button-group">
						<button type="button" id="addBtn">新增資料</button>
						<button type="button" id="updateBtn">修改資料</button>
						<button type="reset" id="resetBtn" class="secon">清空表單</button>
					</div>
				</form>
			</section>
			
			
			
			<!-- 查詢功能 -->
			<section class="card">
				<h2>查詢功能</h2>
				<div class="search-bar">
					<input type="number" id="searchId" placeholder="請輸入要查詢的資料 ID" />
					<button type="button" id="findOneBtn">查詢單筆</button>
					<button type="button" id="findAllBtn">查詢全部</button>
				</div>
			</section>
			
			<!-- 單筆查詢結果(以 json 呈現)-->
			<section class="card">
				<h2>單筆查詢結果</h2>
				<pre id="singleResult" class="result-box">尚未查詢資料</pre>
			</section>
			
			<!-- 全部查詢結果(以 table 呈現) -->
			<section class="card">
				<h2>全部資料列表</h2>
				<div class="table-wrapper">
					<table>
						<thead>
							<tr>
								<th>ID</th>
								<th>站名</th>
								<th>車型</th>
								<th>租車價格</th>
								<th>是否出租</th>
								<th>操作</th>
							</tr>
						</thead>
						<tbody id="bikeTableBody">
							<tr>
								<td colspan="5" class="empty-now">目前沒有資料</td>
							</tr>
						</tbody>
					</table>
				
				</div>
			</section>
		</div>
		<!-- 引入 book.js -->
				<script src="/js/bike.js"></script>
	</body>
</html>
