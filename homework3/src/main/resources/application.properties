spring.application.name=homework2-Learning-Platform

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/learning_platform?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=1234
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# JWT
jwt.secret=my-secret-key-must-be-at-least-32-bytes-long!
jwt.expiration=86400000
